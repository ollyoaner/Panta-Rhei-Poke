- type: entity
  parent: BaseItem
  id: CorticalBorerEggPet
  name: cortical borer egg
  description: This egg is so nice and wet and soft...
  components:
  - type: Sprite
    sprite: _Mono/Mobs/Aliens/cortical_borer_egg.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: GhostRole
    name: ghost-role-information-pet-cortical-borer-name
    description: ghost-role-information-pet-kinky-description
    rules: ghost-role-information-cortical-borer-familiar-rules
    mindRoles:
    - MindRoleGhostRoleFreeAgent
  - type: GhostRoleMobSpawner
    prototype: MobCorticalBorerPet

# spider pet
- type: entity
  id: MobPetSpiderTarantula
  parent: [MobGiantSpider, BaseItem]
  name: pet spider
  description: A small spider that was found in station maints and taken home to help recover. It took a liking to you and now follows you around.
  suffix: Pet
  components:
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: CopperBlood # give spiders copper blood
        Quantity: 60
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Critical
      20: Dead
  - type: Item
    size: Tiny
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: tarantula
      sprite: Mobs/Animals/spider.rsi
      scale: 0.5,0.5
  - type: SpriteMovement
    movementLayers:
      movement:
        state: tarantula-moving
    noMovementLayers:
      movement:
        state: tarantula
  - type: DamageStateVisuals
    states:
      Alive:
        Base: tarantula
      Critical:
        Base: tarantula_dead
      Dead:
        Base: tarantula_dead
  - type: MeleeWeapon
    altDisarm: false
    angle: 0
    animation: WeaponArcBite
    soundHit:
      path: /Audio/Effects/bite.ogg
    damage:
      types:
        Piercing: 1 # very weak bite
  - type: NpcFactionMember
    factions:
    - Critter
  - type: LanguageKnowledge
    speaks:
    - Arachnic
    understands:
    - Arachnic
    - TauCetiBasic
  - type: Prying # disable them from being used to pry open doors whether powered or unpowered
    enabled: false
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Spider # we only let it make webs if its player controlled
    spawnsWebsAsNonPlayer: false
  - type: GhostTakeoverAvailable
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-pet-spider-name
    description: ghost-role-information-pet-description
    rules: ghost-role-information-familiar-rules

- type: entity
  parent: MobPetSpiderTarantula # using the other pet spider as a parent so we don't have to duplicate
  id: MobPetSpiderPurple
  components:
  - type: Sprite  # state used for the old code bases spider pet
    drawdepth: SmallMobs
    scale: 0.5, 0.5
    layers:
    - map: ["enum.DamageStateVisualLayers.Base", "movement"]
      state: midwife
      sprite: Mobs/Animals/spider.rsi
  - type: SpriteMovement
    movementLayers:
      movement:
        state: midwife-moving
    noMovementLayers:
      movement:
        state: midwife
  - type: DamageStateVisuals
    states:
      Alive:
        Base: midwife
      Dead:
        Base: midwife_dead

