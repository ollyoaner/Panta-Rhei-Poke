- type: entity # Euphoria - This entity readded to allow Geras to work again.
  name: geras
  description: A geras of a slime - the name is ironic, isn't it?
  id: MobSlimesGeras
  parent: [BaseMobAdultSlimesNoAi, StripableInventoryBase]
  categories: [ HideSpawnMenu ]
  components:
  # they portable...
  - type: Body
    prototype: Geras
  - type: Inventory
    templateId: gerasinv
  - type: Hands
  - type: MultiHandedItem
  - type: Stripping
  - type: ComplexInteraction
  - type: OfferItem
  - type: SSDIndicator
  - type: StatusIcon
    bounds: -0.5,-0.5,0.5,0.5
  - type: CanEscapeInventory
  - type: Climbing
  - type: Buckle
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Dead # weak af tho
  - type: NpcFactionMember
    factions:
    - NanoTrasen
  - type: Item
    size: Huge
  #- type: Clothing # Awaiting Sprite
    #quickEquip: false
    #sprite: Mobs/Aliens/slimes.rsi
    #equippedPrefix: 0
    #slots:
    #- HEAD
  - type: Sprite
    layers:
    - map: [ "colorMap" ]
      state: slime_geras
    - map: [ "eyesMap" ] # Coming back to this sprite soon - ScarlettJFG
      state: slime_geras_eyes
      shader: unshaded
  - type: RandomSprite
    selected:
      colorMap:
        slime_geras: "#0000FF"
      eyesMap:
        slime_geras_eyes: "#0000FF"
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: MeleeWeapon
    attackRate: 2
    damage:
      types:
        Blunt: 4
  - type: Tag # Floof
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - SlimeEmotes
  - type: MindContainer
  - type: Vocal # Floof. This is 100% more of a bandaid fix until I learn more about how sounds work, but now Geras emotes will have sound.
    sounds:
        Male: MaleSlime
        Female: FemaleSlime
        Unsexed: MaleSlime
  - type: Puller
    needsHands: false
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5 # +.5 from normal movement speed
