## If you add a new trait, make sure to add the corresponding component to the whitelist in \Resources\Prototypes\Entities\Mobs\Player\clone.yml so it gets copied to clones correctly!

- type: trait
  id: Narcolepsy
  name: trait-narcolepsy-name
  description: trait-narcolepsy-desc
  category: DisabilitiesMental # Euphoria
  cost: -2 #floof
  effects:
  - !type:AddCompsEffect
    components:
    - type: Narcolepsy
      maxTimeBetweenIncidents: 600
      minTimeBetweenIncidents: 300
      maxDurationOfIncident: 30
      minDurationOfIncident: 10

- type: trait
  id: ChronicPain
  name: trait-chronic-pain-name
  description: trait-chronic-pain-desc
  category: DisabilitiesMental # Euphoria
  cost: -1
  effects:
  - !type:AddCompsEffect
    components:
    - type: ChronicPain
  - !type:SpawnItemInHandEffect
    item: PillCanisterSoretizone

- type: trait
  id: LightweightDrunk
  name: trait-lightweight-name
  description: trait-lightweight-desc
  category: DisabilitiesMental # Euphoria
  cost: -1 #floof
  effects:
  - !type:AddCompsEffect
    components:
    - type: LightweightDrunk
      boozeStrengthMultiplier: 2

- type: trait
  id: Unrevivable
  name: trait-unrevivable-name
  description: trait-unrevivable-desc
  category: DisabilitiesPhysical # Euphoria
  cost: -6 #floof
  effects:
  - !type:AddCompsEffect
    components:
    - type: Unrevivable
      cloneable: true

- type: trait
  id: Uncloneable
  name: trait-uncloneable-name
  description: trait-uncloneable-desc
  category: DisabilitiesPhysical # Euphoria
  cost: -1 #floof
  effects:
  - !type:AddCompsEffect
    components:
    - type: Uncloneable

- type: trait
  id: Unborgable
  name: trait-unborgable-name
  description: trait-unborgable-desc
  category: DisabilitiesPhysical # Euphoria
  cost: -1 #floof
  effects:
  - !type:AddCompsEffect
    components:
    - type: Unborgable

- type: trait
  id: Redshirt
  name: trait-redshirt-name
  description: trait-redshirt-desc
  category: DisabilitiesPhysical # Euphoria
  cost: -6 #floof
  conflicts:
    - WillToLive
  effects:
  - !type:AddCompsEffect
    components:
    - type: Redshirt
  - !type:ModifyCritDeadThresholdEffect
    deadModifier: 0.5 #-50%

- type: trait
  id: Synthetic
  name: trait-synth-name
  description: trait-synth-desc
  category: Cybernetics # Euphoria
  cost: 0
  conditions:
  - !type:HasCompCondition
    component: Silicon
    invert: true
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
    tooltip: trait-condition-borg-not
  - !type:IsSpeciesCondition
    species: IPC
    invert: true
  effects:
  - !type:AddCompsEffect
    components:
    - type: Synth
