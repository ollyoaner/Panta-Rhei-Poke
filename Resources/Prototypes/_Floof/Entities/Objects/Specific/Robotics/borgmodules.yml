# Generic Modules
- type: entity
  id: BorgModuleFoamForce
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: foam force cyborg module
  description: Grants a cyborg the most deadly of weapons... foam! Fun for the whole family!
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-foam
      sprite: _Floof/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: WeaponRifleFoamBorg
    - item: FoamCutlass
  - type: BorgModuleIcon
    icon: {  sprite: _Floof/Interface/Actions/actions_borg.rsi, state: foam-module  }

- type: entity
  id: BorgModuleFurnishing
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: furnishing cyborg module
  description: A piece of tech that allows cyborgs to partake in simple construction.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-furnish
      sprite: _Floof/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - hand:
        emptyRepresentative: MaterialWoodPlank
        emptyLabel: borg-slot-construction-empty
        whitelist:
          tags:
          - ConstructionMaterial
    - hand:
        emptyRepresentative: SheetSteel
        emptyLabel: borg-slot-construction-empty
        whitelist:
          tags:
          - ConstructionMaterial
    - hand:
        emptyRepresentative: FloorTileItemSteel
        emptyLabel: borg-slot-tiles-empty
        whitelist:
          components:
          - FloorTile
  - type: BorgModuleIcon
    icon: {  sprite: _Floof/Interface/Actions/actions_borg.rsi, state: furnishing-module  }

- type: entity
  id: BorgModuleFluidManip
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: fluid manipulation cyborg module
  description: A piece of tech that allows cyborgs to manipulate fluids.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-fluid
      sprite: _Floof/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: BorgDropper
    - item: ChemistryEmptyVial
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: ChemistryEmptyVial
        whitelist:
          components:
          - FitsInDispenser
    - item: ChemistryEmptyVial
      hand:
        emptyLabel: borg-slot-small-containers-empty
        emptyRepresentative: ChemistryEmptyVial
        whitelist:
          components:
          - FitsInDispenser
  - type: BorgModuleIcon
    icon: {  sprite: _Floof/Interface/Actions/actions_borg.rsi, state: fluid-manipulation-module  }

- type: entity
  id: BorgModuleEnvSurvey
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: environmental survey cyborg module
  description: Advanced environmental surveyance technology. Includes a harmless holographic flaregun!
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-survey
      sprite: _Floof/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:
    - item: WeaponHoloflareGun
    - item: GasAnalyzer
    - item: BorgHandheldGPSBasic
    - item: HandHeldMassScannerBorg
    - item: Floodlight
      hand:
        emptyRepresentative: Floodlight
        emptyLabel: borg-slot-floodlight-empty
        whitelist:
          components:
          - HandheldLight
  - type: BorgModuleIcon
    icon: {  sprite: _Floof/Interface/Actions/actions_borg.rsi, state: survey-module  }

