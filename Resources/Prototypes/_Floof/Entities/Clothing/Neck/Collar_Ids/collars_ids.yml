  id: ClothingNeckCollarEmotionalSupportClown # clown
  name: clown emotional support collar
  description: HEHONK HEHONK A COLLAR FOR THE CLOWN, why not tell them a joke clown?.
  components:
  - type: Pda
    id: EmotionalSupportServiceClownIDCard
    penSlot:
      startingItem: CrayonOrange # give clown a silly crayon instead of a pen
      ejectSound: /Audio/Items/bikehorn.ogg
      priority: -1
      whitelist:
        tags:
        - Write
  - type: PdaBorderColor
    borderColor: "#C18199"
  - type: Slippery # Clown pdas slip so the collar should to of course
  - type: StepTrigger
  - type: CollisionWake
    enabled: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      slips:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        hard: false
        layer:
        - SlipLayer
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 5
        mask:
        - ItemMask

