# Blood
- type: trait
  id: ReplaceBloodRed
  name: trait-replace-blood-red-name
  description: trait-blood-desc
  category: BonusPhysical
  cost: 0 # Almost entirely cosmetic
  usesSlots: false
  conflicts:
  - ReplaceBloodAmmonia
  - ReplaceBloodCopper
  - ReplaceBloodInsect
  - ReplaceBloodSap
  - ReplaceBloodSlime
  - ReplaceBloodYellow
  conditions:
  - !type:HasCompCondition
    component: BorgChassis
    invert: true
  - !type:OneOfSpeciesCondition
    species:
    - Arachnid #CopperBlood
    - Avali #AmmoniaBlood
    - Chitinid #InsectBlood
    - Diona #Sap
    - Moth #InsectBlood
    - Resomi #AmmoniaBlood
    - SlimePerson #Slime
    - Vox #AmmoniaBlood
  effects:
  - !type:ReplaceBloodReagentTraitEffect
    reagent: Blood

