# sock slot socks
- type: entity
  parent: ClothingUndergarmentSocksBase
  id: ClothingUnderSocksKneehighAce
  name: ace knee-high socks
  description: "Soft pair of socks to cover your feet and or paws."
  components:
  - type: Sprite
    sprite: _Floof/Clothing/Under/Socks/socks.rsi
    state: ace_knee
  - type: Clothing
    sprite: _Floof/Clothing/Under/Socks/socks.rsi
    clothingVisuals: # for anyone adding to this in the future you will want to use clothinVisuals if your rsi state isnt named equipped-FEET
      undergarmentSocks:
      - state: ace_knee

