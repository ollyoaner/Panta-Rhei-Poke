  - BorgModuleRescue
  radioChannels:
  - Science
  - Medical
  lawset: Medical # DeltaV: Custom lawset
  job: MedicalDoctor # DeltaV - borg job requirements
  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - BiologicalMetaphysical # DeltaV - Kitsune
  - type: ShowHealthIcons
    damageContainers:
    - Biological
    - BiologicalMetaphysical # DeltaV - Kitsune
