- type: entity
  id: PaperCoupon
  parent: Paper
  name: coupon
  description: A printed coupon that can be redeemed to the person who printed it.
  components:
  - type: Tag
    tags:
    - Document
    - Trash
    - Paper
  - type: StaticPrice
    price: 0
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_receipt_horizontal
    - state: paper_receipt_horizontal_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_perforated.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 6.0
    backgroundImageTile: true
    backgroundPatchMargin: 0.0, 6.0, 0.0, 6.0
    contentMargin: 12.0, 0.0, 12.0, 0.0
    # This is a narrow piece of paper
    maxWritableArea: 256.0, 0.0
  - type: Construction
    graph: PaperCoupon
    node: coupon

- type: entity
  parent: Paper # using base paper
  id: PaperPlane
  name: Paper Plane
  description: It's a bird! No its a plane! No is just a paper plane.
  components:
  - type: Sprite
    sprite: _Floof/Objects/Misc/paper_plane.rsi
    layers:
    - state: icon # actual sprite of the plane
    - state: icon # we dont have a written on paper plane sprite so overriding this with our icon
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - sprite: /Textures/Objects/Misc/bureaucracy.rsi # point to the stamp sprites so we can use them
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
      state: paper_stamp-generic
      scale: 0.3, 0.3 # scale them down so we can have a tiny stamp on the wing
      offset: -0.13, 0.07 # offset just enough so the stamp is on the wing
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PhysShapeCircle
          radius: 0.25
        density: 20
        mask:
        - ItemMask
        restitution: 0.5 # a little bouncy
        friction: 0.2
  - type: Item
    size: Small
    sprite: _Floof/Objects/Misc/paper_plane.rsi
  - type: TileFrictionModifier
    modifier: 0.1
  - type: EmbeddableProjectile
    removalTime: .2
  - type: ThrowingAngle
    angle: 270
  - type: Tag
    tags:
    - Trash
  - type: Construction
    graph: PaperPlane
    node: paperplane

- type: entity
  parent: BaseItem
  id: PaperOrigamiSwan
  name: Origami Swan
  description: It's a bird! No its a plane! No wait its just an Origami Swan.
  components:
  - type: Sprite
    sprite: _Floof/Objects/Misc/origami.rsi
    state: origami_swan
  - type: Item
    size: Small
    sprite: _Floof/Objects/Misc/origami.rsi
  - type: Tag
    tags:
    - Trash
  - type: Construction
    graph: PaperPlane
    node: origamiswan
