# Generic quadborg
- type: borgType
  id: quadgeneric
  # Description
  dummyPrototype: QuadChassisGeneric
  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    # - BorgModuleScience
  defaultModules:
  - BorgModuleTool
  - BorgModuleInflatable
  - BorgModuleArtifact
  - BorgModuleAnomaly
  radioChannels:
  - Science
  addComponents:
  - type: Crawler
  # Visual
  clientComponents:
  - type: Sprite
    scale: 0.75, 0.75
    noRot: true
    drawdepth: Mobs
    sprite: _Floof/Mobs/Silicon/chassis.rsi
    layers:
    - state: quadgen
      map: ["enum.BorgVisualLayers.Body", "movement"]
    - state: quadgen_e_r
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: quadgen_l
      shader: unshaded
      map: ["light","enum.BorgVisualLayers.LightStatus"]
      visible: false
  inventoryTemplateId: borgShort
  spriteBodyState: quadgen
  spriteHasMindState: quadgen_e
  spriteNoMindState: quadgen_e_r
  spriteToggleLightState: quadgen_l
  # Pet
  petSuccessString: petting-success-generic-cyborg
  petFailureString: petting-failure-generic-cyborg

