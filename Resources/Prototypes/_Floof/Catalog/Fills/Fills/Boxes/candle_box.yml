- type: entity
  name: magic candle box
  parent: BoxCardboard
  id: BoxMagicCandle
  description: This box is specifically moulded to only carry magic candles.
  components:
  - type: Sprite
    layers:
    - state: box
    - state: candle
  - type: Storage
    grid:
    - 0,0,5,3
    whitelist:
      tags:
      - Candle
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CandleInfinite
          amount: 4
        - id: CandleBlueInfinite
          amount: 2
        - id: CandleRedInfinite
          amount: 2
        - id: CandleGreenInfinite
          amount: 2
        - id: CandlePurpleInfinite
          amount: 2
