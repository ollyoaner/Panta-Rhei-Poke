- type: entity
  parent: BaseSurviveObjective
  abstract: true
  id: BaseNTAgentObjective
  components:
  - type: Objective
    issuer: objective-issuer-NTAgent
    difficulty: 1
  - type: RoleRequirement
    roles:
    - NTAgentRole

- type: entity
  parent: BaseNTAgentObjective
  id: BaseNTAgentTestDepartment
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/bureaucracy.rsi
      state: paper_words

# listen to CC
- type: entity
  parent: BaseNTAgentObjective
  id: NTAgentObjective
  name: Do your task.
  description: If contacted by Central, complete their objectives too.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Ears/Headsets/centcom.rsi
      state: icon

# frame someone
- type: entity
  parent: BaseNTAgentObjective
  id: FrameRandomPersonObjective
  description: We would like if they got into legal trouble. Ensure they end up in prison.
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/handcuffs.rsi
      state: handcuff
    difficulty: 1.75
    unique: false
  - type: TargetObjective
    title: objective-condition-frame-person-title
  - type: PickRandomPerson
    filters:
    # Can't have multiple objectives to kill the same person.
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
        - TargetObjectiveImmune # DeltaV

# fire someone
- type: entity
  parent: BaseNTAgentObjective
  id: FireRandomPersonObjective
  description: We need them fired for several reasons, but we legally can't find one. Make one up.
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/id_cards.rsi
      state: default
    difficulty: 1.75
    unique: false
  - type: TargetObjective
    title: objective-condition-fired-person-title
  - type: PickRandomPerson
    filters:
    # Can't have multiple objectives to kill the same person.
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
        - TargetObjectiveImmune # DeltaV

# auditing
- type: entity
  parent: BaseNTAgentTestDepartment
  id: TestSecurityObjective
  name: Audit Security.
  description: Test their response time, their knowledge of law or whatever else. Send the results to Central.

- type: entity
  parent: BaseNTAgentTestDepartment
  id: TestEngineeringObjective
  name: Audit Engineering.
  description: Test their response time to sabotage, structural damage or whatever else. Send the results to Central.

- type: entity
  parent: BaseNTAgentTestDepartment
  id: TestMedicalObjective
  name: Audit Medical.
  description: Test their response time, their medical knowledge or whatever else. Send the results to Central.

# defunding
- type: entity
  parent: BaseNTAgentObjective
  id: DefundDepartmentObjective
  name: Defund any department.
  description: Embezzle or waste any department's funds.
  components:
  - type: Objective
    icon:
      sprite: _DV/Objects/Misc/first_bill.rsi
      state: icon

#Euphoria
- type: entity
  parent: BaseNTAgentTestDepartment
  id: RuinServiceRecord
  name: Sabotage Service.
  description: This station has received far too much praise for its service. See that they lose at least one point to their ratings.

- type: entity
  parent: BaseNTAgentObjective
  id: DefameRandomCommandObjective
  description: They currently have too much clout. Do something about that.
  components:
  - type: Objective
    icon:
      sprite: Objects/Misc/id_cards.rsi
      state: icon-captain
    difficulty: 2
    unique: false
  - type: TargetObjective
    title: objective-condition-defame-person-title
  - type: PickRandomPerson
    filters:
    - !type:BodyMindFilter
      whitelist:
        components:
        - CommandStaff
    - !type:TargetObjectiveMindFilter
      blacklist:
        components:
        - KillPersonCondition
        - TargetObjectiveImmune # DeltaV

- type: entity
  parent: BaseNTAgentObjective
  id: ObjectiveCounterInsurgent
  name: Secretly Fight the Forces of Evil
  description: I have a lot of money invested in this station. Safeguard my asset, but do not reveal our involvement.
  components:
  - type: Objective
    icon:
      sprite: Clothing/Ears/Headsets/centcom.rsi
      state: icon
